<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body class="min-h-screen max-w-md mx-auto bg-base-200">
  
    <header  class=" border-b-1 border-gray-300 sticky top-0 z-10 bg-base-300">
        <section  class="w-11/12  mx-auto py-[10px] flex justify-between items-center">
            <div class="left-side flex gap-2">
                <div class="logo w-[60px]">
                    <img src="./assets/logo.png" alt="">
                </div>
                <div>
                    <h2 class="font-extrabold text-[18px]">$<span id="balance">45000</span></h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right-side flex gap-2">               
                <div>
                    <a class="btn rounded-lg btn-outline border-gray-300" href="index.html">
                       <p class="text-neutral/50 "><i class="fa-duotone fa-solid fa-arrow-right-from-bracket"></i> Log Out</p>
                   </a>
                </div>
                <div class="day-night-theme">
                  <label class="swap swap-rotate"> 
                         <!-- this hidden checkbox controls the state -->
                         <input type="checkbox" class="theme-controller" value="valentine" />
                       
                         <!-- sun icon -->
                         <svg
                           class="swap-off h-10 w-10 fill-current"
                           xmlns="http://www.w3.org/2000/svg"
                           viewBox="0 0 24 24">
                           <path
                             d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,                       0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,                       0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.                       5,12,3.5,3.5,0,0,1,12,15.5Z" />
                         </svg>
                       
                         <!-- moon icon -->
                         <svg
                           class="swap-on h-10 w-10 fill-current"
                           xmlns="http://www.w3.org/2000/svg"
                           viewBox="0 0 24 24">
                           <path
                             d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.                       27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z" />
                         </svg>
                  </label>
                </div>
            </div>
            
        </section>
    </header>
    
    <main>
        <section class="w-11/12 mx-auto space-y-2 py-7">
                <h2 class="font-bold text-2xl">Welcome to Pay<span class="text-primary/70">oo</span></h2>
                <p class="text-neutral/50">Enjoy easy and convenient financial services with us. <br> Cashout charge is low and </p>
        </section>

        <section class="buttons max-w-[402px] mx-auto grid grid-cols-3 gap-3">
        
            <button class="btn btn-outline rounded-xl border-gray-300 btn-primary flex-col h-[90px] px-6 py-5 ">
                <img class="mb-2" src="./assets/opt-1.png" alt="">
                <p class="text-neutral/50">Add Money</p>
            </button>
            <button class="btn btn-outline rounded-xl border-gray-300 btn-primary flex-col h-[90px] px-6 py-5">
                <img class="mb-2" src="./assets/opt-2.png" alt="">
                <p class="text-neutral/50">Cashout</p>
            </button>
            <button class="btn btn-outline rounded-xl border-gray-300 btn-primary flex-col h-[90px] px-6 py-5">
                <img class="mb-2" src="./assets/opt-3.png" alt="">
                <p class="text-neutral/50">Transfer Money</p>
            </button>
            <button class="btn btn-outline rounded-xl border-gray-300 btn-primary flex-col h-[90px] px-6 py-5 ">
                <img class="mb-2" src="./assets/opt-4.png" alt="">
                <p class="text-neutral/50">Get Bonus</p>
            </button>
            <button class="btn btn-outline rounded-xl border-gray-300 btn-primary flex-col h-[90px] px-6 py-5 ">
                <img class="mb-2" src="./assets/opt-5.png" alt="">
                <p class="text-neutral/50">Pay Bill</p>
            </button>
            <button class="btn btn-outline rounded-xl border-gray-300 btn-primary flex-col h-[90px] px-6 py-5">
                <img class="mb-2" src="./assets/opt-6.png" alt="">
                <p class="text-neutral/50">Transactions</p>
            </button>

        </section>

        <section id="cashout" class="w-11/12 py-5 mx-auto">
            <h2 class="text-xl text-neutral/ mb-5 font-bold">Cashout</h2>
             <div>
                <div class="card bg-base-100 w-full shadow rounded-[24px]">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label font-bold text-neutral/70">Agent Number</label>
          <input id="agent-number" type="text" maxlength="11" minlength="11" class="w-full input rounded-full bg-base-200 border-none" placeholder="Enter 11 digit number">
          <label class="label font-bold text-neutral/70">Amount</label>
          <input id="amount" type="number" class="w-full input rounded-full bg-base-200 border-none" placeholder="Enter amount to withdraw">
          <label class="label font-bold text-neutral/70">Pin Number</label>
          <input id="pin-number" type="text" maxlength="4" class="w-full input rounded-full bg-base-200 border-none" placeholder="Enter 4 digit pin number" />
          <div><a class="link link-hover"></a></div>
          <button id="cashout-button" class="btn btn-primary mt-1 rounded-full shadow-none">Withdraw Money</button>
        </fieldset>
      </div>
    </div>
            </div>
        </section>
    </main>

    <footer>
    </footer>
    <script src="./script/machine.js"></script>
    <script src="./script/cashout.js"></script>
  <!-- <script src="./script/login.js"></script> -->
</body>
</html>
